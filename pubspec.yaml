name: smart_fish_feeder
description: Smart Fish Feeder — Automated feeding for Ugandan tilapia farms. Arduino IoT + Django REST + Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: 1.0.6
  provider: 6.1.2
  http: 1.2.1
  shared_preferences: 2.2.3
  fl_chart: 0.68.0
  intl: 0.19.0
  percent_indicator: 4.2.3
  postgres: 3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
